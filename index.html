<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELLPRIM VPN</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px;
}

.title {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
}

.button {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    text-align: center;
    text-decoration: none;
    color: white;
    background: #334155;
    font-weight: 500;
    transition: 0.2s;
}

.button:hover {
    background: #475569;
}

.button.primary {
    background: #22c55e;
    color: black;
    font-weight: 600;
}

.button.primary:hover {
    background: #16a34a;
}

.small {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 10px;
}

.key {
    background: #020617;
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
    word-break: break-all;
    margin-top: 10px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<div class="title">⚡ SELLPRIM VPN</div>

<div class="card">
    🔑 Подключение...
</div>

<div class="card">

    <a id="openApp" class="button primary">
        🚀 Добавить ключ в приложение
    </a>

    <div id="installText" class="small">
        Если приложение не открылось — установите ниже
    </div>

    <a id="mainDownload" class="button"></a>

    <a id="androidBtn" class="button hidden">📱 Скачать для Android</a>
    <a id="iosBtn" class="button hidden">🍏 Скачать для iOS</a>
    <a id="pcBtn" class="button hidden">💻 Скачать для ПК</a>

    <a id="copyBtn" class="button">📋 Скопировать ключ</a>

    <div id="keyBlock" class="key hidden"></div>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("key");

const openBtn = document.getElementById("openApp");
const copyBtn = document.getElementById("copyBtn");
const keyBlock = document.getElementById("keyBlock");

const mainDownload = document.getElementById("mainDownload");
const androidBtn = document.getElementById("androidBtn");
const iosBtn = document.getElementById("iosBtn");
const pcBtn = document.getElementById("pcBtn");

// 📱 реальные ссылки
const ANDROID_LINK = "https://play.google.com/store/apps/details?id=com.v2ray.ang";
const IOS_LINK = "https://apps.apple.com/app/id6450534064"; // v2ray / hiddify
const PC_LINK = "https://github.com/FuriousVPN/Furious/releases";

// 🧠 детект устройства
const ua = navigator.userAgent.toLowerCase();

let device = "pc";

if (/iphone|ipad|ipod/.test(ua)) {
    device = "ios";
} else if (/android/.test(ua)) {
    device = "android";
}

// 🎯 логика
if (!key) {
    document.querySelector(".title").innerText = "Ошибка: ключ не найден";
} else {

    openBtn.href = key;

    // 🚀 авто открытие
    window.location.href = key;

    // 👇 главная кнопка
    if (device === "ios") {
        mainDownload.innerText = "🍏 Скачать для iPhone";
        mainDownload.href = IOS_LINK;

        iosBtn.classList.remove("hidden");
        iosBtn.href = IOS_LINK;

        androidBtn.classList.remove("hidden");
        androidBtn.href = ANDROID_LINK;

        pcBtn.classList.remove("hidden");
        pcBtn.href = PC_LINK;

    } else if (device === "android") {
        mainDownload.innerText = "📱 Скачать для Android";
        mainDownload.href = ANDROID_LINK;

        androidBtn.classList.remove("hidden");
        androidBtn.href = ANDROID_LINK;

        iosBtn.classList.remove("hidden");
        iosBtn.href = IOS_LINK;

        pcBtn.classList.remove("hidden");
        pcBtn.href = PC_LINK;

    } else {
        mainDownload.innerText = "💻 Скачать для ПК";
        mainDownload.href = PC_LINK;

        pcBtn.classList.remove("hidden");
        pcBtn.href = PC_LINK;

        androidBtn.classList.remove("hidden");
        androidBtn.href = ANDROID_LINK;

        iosBtn.classList.remove("hidden");
        iosBtn.href = IOS_LINK;
    }

    // 📋 копирование
    copyBtn.onclick = () => {
        navigator.clipboard.writeText(key);
        keyBlock.innerText = "Скопировано!";
        keyBlock.classList.remove("hidden");
    };
}
</script>

</body>
</html>
