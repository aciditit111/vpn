<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELLPRIM VPN</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0b1220;
    color: #fff;
}

.container {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px;
}

.title {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
}

.button {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    text-align: center;
    text-decoration: none;
    color: white;
    background: #334155;
    font-weight: 500;
}

.button.primary {
    background: #22c55e;
    color: black;
    font-weight: 600;
}

.key {
    background: #020617;
    padding: 12px;
    border-radius: 10px;
    font-size: 12px;
    word-break: break-all;
    margin-top: 10px;
    opacity: 0.7;
}

.hidden {
    display: none;
}

.small {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">⚡ SELLPRIM VPN</div>

<div class="card">
    🔑 Подключение...
    <div id="key" class="key hidden"></div>
</div>

<div id="fallback" class="hidden">

    <div class="card">

        <a id="openApp" class="button primary">
            🚀 Перенести ключ в приложение
        </a>

        <div class="small">
            Если приложение не установлено — скачайте ниже
        </div>

        <a href="#" class="button">📱 Android</a>
        <a href="#" class="button">🍏 iOS</a>
        <a href="#" class="button">💻 ПК</a>

        <a id="showKeyBtn" class="button">
            🔑 Показать ключ
        </a>

        <div id="keyBlock" class="key hidden"></div>

    </div>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("key");

const openBtn = document.getElementById("openApp");
const fallback = document.getElementById("fallback");
const keyBlock = document.getElementById("keyBlock");
const showKeyBtn = document.getElementById("showKeyBtn");

if (!key) {
    document.querySelector(".title").innerText = "Ошибка: ключ не найден";
} else {

    openBtn.href = key;

    // 🚀 ПЫТАЕМСЯ ОТКРЫТЬ ПРИЛОЖЕНИЕ СРАЗУ
    window.location.href = key;

    // 👇 ЕСЛИ НЕ ОТКРЫЛОСЬ — ПОКАЗЫВАЕМ UI
    setTimeout(() => {
        fallback.classList.remove("hidden");
    }, 1500);

    // 👇 показать ключ вручную
    showKeyBtn.onclick = () => {
        keyBlock.innerText = key;
        keyBlock.classList.remove("hidden");
    };
}
</script>

</body>
</html>
