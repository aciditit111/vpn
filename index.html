<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f2f2f7;
}

.container {
    max-width: 480px;
    margin: auto;
    padding: 20px;
}

.title {
    text-align: center;
    font-weight: 600;
    font-size: 18px;
    margin-bottom: 20px;
}

.card {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.06);
}

.button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: #e9e9ed;
    font-weight: 500;
    cursor: pointer;
    border: none;
    margin-top: 10px;
    transition: 0.2s;
}

.button:hover {
    background: #ddd;
}

.primary {
    background: #000;
    color: #fff;
}

.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f4f4f6;
    padding: 14px;
    border-radius: 12px;
    margin-top: 10px;
    text-decoration: none;
    color: black;
}

.badge {
    background: #e1e1e6;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
}

.small {
    font-size: 13px;
    color: #777;
    margin-top: 6px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">SELLPRIM VPN</div>

<div class="card">
    <b id="mainTitle">Перенос ключа в приложение</b>
    <div class="small" id="status">Подключение...</div>
</div>

<div class="card" id="apps"></div>

<div class="card">
    <div id="copyBtn" class="button">Скопировать ключ вручную</div>
</div>

<div class="card">
    <div class="small">Показать ключ (если нужно скопировать вручную)</div>
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const key = params.get("key");

const ua = navigator.userAgent;
let device = "pc";
if (/iPhone|iPad/i.test(ua)) device = "ios";
if (/Android/i.test(ua)) device = "android";

const links = {
    android: "https://play.google.com/store/apps/details?id=com.v2ray.ang",
    ios: "https://apps.apple.com/app/id6450534064",
    pc: "https://github.com/FuriousVPN/Furious/releases/latest"
};

function render() {
    let html = `<b>Установите приложение</b>`;

    function row(name, link, tag, main=false) {
        return `<a class="${main ? 'button primary' : 'row'}" href="${link}" target="_blank">
            ${main ? name : `<span>${name}</span><span class="badge">${tag}</span>`}
        </a>`;
    }

    if (device === "android") html += row("Скачать для Android", links.android, "", true);
    if (device === "ios") html += row("Скачать для iPhone", links.ios, "", true);
    if (device === "pc") html += row("Скачать для ПК", links.pc, "", true);

    html += `<div class="small">Рекомендуется для вашего устройства</div>`;

    if (device !== "android") html += row("Android", links.android, "Play");
    if (device !== "ios") html += row("iOS", links.ios, "App");
    if (device !== "pc") html += row("ПК", links.pc, "Download");

    document.getElementById("apps").innerHTML = html;
}

document.getElementById("copyBtn").onclick = () => {
    navigator.clipboard.writeText(key || "");
    alert("Скопировано");
};

if (key) {
    setTimeout(() => {
        window.location.href = key;
    }, 400);

    setTimeout(() => {
        document.getElementById("mainTitle").innerText = "Приложение не найдено";
        document.getElementById("status").innerText = "Установите его, выбрав вариант ниже";
        render();
    }, 2500);
} else {
    render();
}

</script>

</body>
</html>
