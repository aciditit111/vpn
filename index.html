<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELLPRIM VPN</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 500px;
    margin: 0 auto;
    padding: 20px;
}

.title {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
}

.button {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    text-align: center;
    text-decoration: none;
    color: white;
    background: #334155;
    font-weight: 500;
}

.button.primary {
    background: #22c55e;
    color: black;
    font-weight: 600;
}

.small {
    opacity: 0.7;
    font-size: 14px;
    margin-top: 10px;
}

.key {
    background: #020617;
    padding: 12px;
    border-radius: 10px;
    font-size: 12px;
    word-break: break-all;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">⚡ SELLPRIM VPN</div>

<div class="card">
    👇 Нажми, чтобы подключиться
    <div id="key" class="key">загрузка...</div>
</div>

<div id="actions" style="display:none;">

    <div class="card">
        <a id="openApp" class="button primary">🚀 Открыть VPN</a>

        <div class="small">Если не открылось — установи приложение</div>

        <a href="#" class="button">📱 Скачать для Android</a>
        <a href="#" class="button">🍏 Скачать для iOS</a>
        <a href="#" class="button">💻 Скачать для ПК</a>
    </div>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("key");

const keyBlock = document.getElementById("key");
const openBtn = document.getElementById("openApp");
const actions = document.getElementById("actions");

if (!key) {
    keyBlock.innerText = "Ошибка: ключ не найден";
} else {
    keyBlock.innerText = key;
    openBtn.href = key;

    // 🚀 пробуем открыть приложение
    setTimeout(() => {
        window.location.href = key;
    }, 300);

    // 👇 если не открылось — показываем UI
    setTimeout(() => {
        actions.style.display = "block";
    }, 2000);
}
</script>

</body>
</html>
