<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELLPRIM VPN</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0b1220;
    color: #fff;
}

.container {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px;
}

.title {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
}

.button {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    text-align: center;
    text-decoration: none;
    color: white;
    background: #334155;
    font-weight: 500;
    transition: 0.2s;
}

.button:hover {
    background: #475569;
}

.button.primary {
    background: #22c55e;
    color: black;
    font-weight: 600;
}

.button.primary:hover {
    background: #16a34a;
}

.key {
    background: #020617;
    padding: 12px;
    border-radius: 10px;
    font-size: 12px;
    word-break: break-all;
    margin-top: 10px;
}

.hidden {
    display: none;
}

.small {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">⚡ SELLPRIM VPN</div>

<div class="card">
    🔑 Подключение к VPN...
</div>

<div class="card">

    <a id="openApp" class="button primary">
        🚀 Добавить ключ в приложение
    </a>

    <div class="small">
        Если приложение не открылось — установите его ниже
    </div>

    <a href="#" class="button">📱 Скачать для Android</a>
    <a href="#" class="button">🍏 Скачать для iOS</a>
    <a href="#" class="button">💻 Скачать для ПК</a>

    <a id="copyBtn" class="button">
        📋 Скопировать ключ вручную
    </a>

    <div id="keyBlock" class="key hidden"></div>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("key");

const openBtn = document.getElementById("openApp");
const keyBlock = document.getElementById("keyBlock");
const copyBtn = document.getElementById("copyBtn");

if (!key) {
    document.querySelector(".title").innerText = "Ошибка: ключ не найден";
} else {

    openBtn.href = key;

    // 🚀 пробуем открыть
    window.location.href = key;

    // 📋 копирование
    copyBtn.onclick = () => {
        navigator.clipboard.writeText(key);
        keyBlock.innerText = "Скопировано: " + key;
        keyBlock.classList.remove("hidden");
    };
}
</script>

</body>
</html>
